name: grosir_tiga_bersaudara
description: Aplikasi Inventory dan Penjualan Grosir Tiga Bersaudara
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.9

  # State Management
  provider: ^6.1.1

  # Networking
  http: ^1.1.2
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.0.0

  # Charts
  fl_chart: ^0.66.0

  # Form & Validation
  intl: ^0.18.1

  # Image
  image_picker: ^1.0.5

  # PDF & Excel
  printing: ^5.11.1
  pdf: ^3.10.7
  excel: ^2.1.0

  # Utils
  url_launcher: ^6.2.1
  share_plus: ^7.2.2
  connectivity_plus: ^5.0.2

  # Biometric
  local_auth: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700